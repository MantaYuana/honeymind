services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: honeymind
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: honeymind_db
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - honeymind-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - honeymind-network

networks:
  honeymind-network:
    driver: bridge
